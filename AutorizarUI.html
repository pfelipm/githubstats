<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <!-- Importar Materialize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <!-- Importar tipografía Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
      body { 
        padding: 0; 
        margin: 0; 
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #f8fafc;
        overflow: hidden;
      }
      .container {
        padding: 25px;
        text-align: center;
      }
      .card {
        border-radius: 12px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        background: white;
        padding: 30px 20px;
      }
      .title {
        font-size: 22px;
        font-weight: 700;
        color: #1e1b4b;
        margin-top: 0;
        margin-bottom: 10px;
      }
      .description {
        font-size: 14px;
        color: #64748b;
        margin-bottom: 30px;
        line-height: 1.6;
      }
      .btn-auth {
        background: linear-gradient(135deg, #4f46e5, #6366f1) !important;
        border-radius: 20px;
        text-transform: none;
        font-weight: 500;
        padding: 0 30px;
        height: 42px;
        line-height: 42px;
        box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2) !important;
        display: inline-block;
        color: white;
        text-decoration: none;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .btn-auth:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 8px -1px rgba(79, 70, 229, 0.3) !important;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h5 class="title">Autorizar acceso a GitHub</h5>
        <p class="description">
          Es necesario conceder permisos a la aplicación para recuperar las estadísticas de tráfico de tus repositorios de GitHub de forma automática.
        </p>
        
        <a id="auth-link" href="#" target="_blank" class="btn btn-auth waves-effect waves-light" onclick="cerrarModal()">Conceder acceso</a>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        // Cargar URL de autorización
        google.script.run.withSuccessHandler(url => {
          document.getElementById('auth-link').href = url;
        }).obtenerUrlAutorizacion();
      });

      function cerrarModal() {
        // Cierra el diálogo unos segundos después de que el usuario haga clic para dar tiempo a abrir la pestaña
        setTimeout(() => {
          google.script.host.close();
        }, 1500);
      }
    </script>
  </body>
</html>
